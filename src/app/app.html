<div class="flex h-screen w-full bg-[#0f172a] overflow-hidden text-slate-200">

  <aside class="w-64 bg-slate-900 flex flex-col shadow-2xl border-r border-slate-800/50">

    <div class="p-6 flex items-center justify-center border-b border-slate-800">
      <div class="flex items-center space-x-3">
        <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z" />
          </svg>
        </div>
        <span class="text-white text-xl font-bold tracking-wider">BankApp</span>
      </div>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">

      <a routerLink="/clients"
         routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-900/40"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all duration-200 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span class="font-medium">Clientes</span>
      </a>

      <a routerLink="/accounts"
         routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-900/40"
         class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all duration-200 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
        <span class="font-medium">Cuentas</span>
      </a>

      <a routerLink="/movements"
         routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-900/40"
         class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all duration-200 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
        <span class="font-medium">Movimientos</span>
      </a>

    </nav>

    <div class="p-4 border-t border-slate-800">
      <div class="flex items-center p-2 rounded-lg bg-slate-800/30 border border-slate-700/30">
        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-xs font-bold text-white shadow-lg">
          KS
        </div>
        <div class="ml-3 overflow-hidden">
          <p class="text-xs font-medium text-white truncate">Kevin Stalin</p>
          <p class="text-[10px] text-slate-500 truncate font-mono tracking-tighter">FULLSTACK DEV</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto bg-[#0f172a]">
    <div class="p-8 max-w-7xl mx-auto">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>

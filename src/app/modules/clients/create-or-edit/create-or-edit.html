<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">

  <div class="relative w-full max-w-2xl bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl animate-in fade-in zoom-in duration-200 overflow-hidden">

    <button
      type="button"
      (click)="close()"
      class="absolute top-4 right-4 p-1 rounded-lg text-slate-500 hover:bg-slate-700 hover:text-white transition-all">
      <span class="material-icons">close</span>
    </button>

    <div class="p-6 border-b border-slate-700 bg-slate-800/50">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-indigo-500/20 rounded-lg">
          <span class="material-icons text-indigo-400">
            {{ isEdit ? 'edit' : 'person_add' }}
          </span>
        </div>
        <h2 class="text-xl font-bold text-white">
          {{ isEdit ? 'Actualizar Cliente' : 'Registro de Nuevo Cliente' }}
        </h2>
      </div>
    </div>

    <div class="p-6 max-h-[80vh] overflow-y-auto custom-scrollbar">
      <form [formGroup]="clientForm" (ngSubmit)="save()" class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">User ID</label>
          <input formControlName="clientId" type="text"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600"
            placeholder="ej: jsmith">
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Contraseña</label>
          <input formControlName="password" type="password"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600"
            placeholder="••••••••">
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Nombre Completo</label>
          <input formControlName="name" type="text"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600"
            placeholder="ej: Juan Pérez">
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">DNI / Cédula</label>
          <input formControlName="identification" type="text"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Teléfono</label>
          <input formControlName="phone" type="text"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
        </div>

        <div class="flex flex-col gap-2 md:col-span-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Dirección Domiciliaria</label>
          <textarea formControlName="address" rows="2"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all resize-none"></textarea>
        </div>

        <div class="md:col-span-2 flex justify-end gap-3 mt-4 pt-6 border-t border-slate-700">
          <button
            type="button"
            (click)="close()"
            class="px-6 py-3 rounded-xl text-slate-400 hover:bg-slate-700 hover:text-white transition-colors font-medium">
            Cancelar
          </button>
          <button
            type="submit"
            [disabled]="clientForm.invalid"
            class="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl font-bold shadow-lg shadow-indigo-500/30 transition-all transform active:scale-95">
            {{ isEdit ? 'Guardar Cambios' : 'Registrar Cliente' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

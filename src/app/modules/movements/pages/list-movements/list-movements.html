<div class="p-6 bg-slate-900 min-h-screen">

  <div class="mb-8 flex justify-between items-start">
    <div>
      <h2 class="text-white text-2xl font-bold">Estado de Cuenta</h2>
      <p class="text-slate-500 text-sm">Genera reportes detallados por cliente y rango de fechas</p>
    </div>

    <button (click)="openCreateModal()"
      class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl transition-all font-bold shadow-lg shadow-emerald-500/20 active:scale-95 text-sm">
      <span class="material-icons text-sm">add</span>
      Nuevo Movimiento
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 p-6 bg-slate-800/50 border border-slate-700 rounded-2xl backdrop-blur-sm">

    <div class="flex flex-col gap-2">
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Cliente</label>
      <select [(ngModel)]="selectedClientId"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500/50 appearance-none cursor-pointer">
        <option value="" disabled>Seleccione un cliente</option>
        @for (account of accounts; track account.id) {
          <option [value]="account.client.id">{{ account.accountNumber + ' - ' + account.client.name }}</option>
        }
      </select>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Desde</label>
      <input type="date" [(ngModel)]="startDate"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500/50 [color-scheme:dark]">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Hasta</label>
      <input type="date" [(ngModel)]="endDate"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-slate-200 outline-none focus:ring-2 focus:ring-indigo-500/50 [color-scheme:dark]">
    </div>

    <div class="flex items-end">
      <button (click)="generateReport()"
        class="w-full flex items-center justify-center gap-2 px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-all font-bold shadow-lg shadow-indigo-500/20 active:scale-95">
        <span class="material-icons">search</span>
        Generar Reporte
      </button>
    </div>
  </div>

  <app-table
    [data]="movements"
    [columns]="columns">
  </app-table>

  <app-create-or-edit
    [isOpen]="isModalOpen"
    [accounts]="accounts"
    (onClose)="closeCreateModal()"
    (onSaved)="onMovementSaved()">
  </app-create-or-edit>

</div>

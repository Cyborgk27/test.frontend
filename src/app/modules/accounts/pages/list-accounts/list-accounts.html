<div class="p-6 bg-slate-900 min-h-screen">

  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-white text-2xl font-bold">Gestión de Cuentas</h2>
      <p class="text-slate-500 text-sm">Administración de cuentas bancarias y saldos</p>
    </div>

    <button
      (click)="openCreate()"
      class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl transition-all font-bold shadow-lg shadow-emerald-500/20 active:scale-95">
      <span class="material-icons">add_card</span>
      Nueva Cuenta
    </button>
  </div>

  <app-table
    [data]="accounts"
    [columns]="columns"
    [actions]="actions">
  </app-table>

  @if (showModal) {
    <app-create-or-edit-account
      [accountData]="selectedAccount"
      (onClose)="closeModal()">
    </app-create-or-edit-account>
  }
</div>

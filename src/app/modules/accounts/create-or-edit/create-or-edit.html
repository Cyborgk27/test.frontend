<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
  <div class="relative w-full max-w-xl bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl animate-in fade-in zoom-in duration-200">

    <button (click)="close()" class="absolute top-4 right-4 text-slate-500 hover:text-white">
      <span class="material-icons">close</span>
    </button>

    <div class="p-8">
      <div class="flex items-center gap-3 mb-8 border-b border-slate-700 pb-4">
        <div class="p-2 bg-emerald-500/20 rounded-lg">
          <span class="material-icons text-emerald-400">account_balance_wallet</span>
        </div>
        <h2 class="text-xl font-bold text-white">
          {{ isEdit ? 'Editar Cuenta' : 'Nueva Cuenta Bancaria' }}
        </h2>
      </div>

      <form [formGroup]="accountForm" (ngSubmit)="save()" class="space-y-5">

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Asignar Cliente</label>
          <select formControlName="clientId"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-emerald-500/50 outline-none appearance-none cursor-pointer">
            <option [ngValue]="null" disabled>Seleccione un cliente...</option>
            @for (client of clients; track client.id) {
              <option [ngValue]="client.id">{{ client.name }} ({{ client.identification }})</option>
            }
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">N° de Cuenta</label>
            <input formControlName="accountNumber" type="text"
              class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 outline-none focus:ring-2 focus:ring-emerald-500/50"
              placeholder="Ej: 220501...">
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Tipo</label>
            <select formControlName="accountType"
              class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 outline-none focus:ring-2 focus:ring-emerald-500/50">
              <option value="Ahorro">Ahorro</option>
              <option value="Corriente">Corriente</option>
            </select>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Saldo Inicial</label>
          <div class="relative">
            <span class="absolute left-4 top-3 text-slate-500">$</span>
            <input formControlName="initialBalance" type="number"
              class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-8 pr-4 py-3 text-slate-200 outline-none focus:ring-2 focus:ring-emerald-500/50">
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-slate-700">
          <button type="button" (click)="close()" class="px-6 py-3 text-slate-400 hover:text-white font-medium transition-colors">
            Cancelar
          </button>
          <button type="submit" [disabled]="accountForm.invalid"
            class="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white rounded-xl font-bold shadow-lg shadow-emerald-500/30 transition-all active:scale-95">
            {{ isEdit ? 'Guardar Cambios' : 'Crear Cuenta' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
